<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results - Quiz Master</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .results-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .results-header {
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .results-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        .results-subtitle {
            font-size: 18px;
            color: #666;
            font-weight: 500;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            box-shadow: 0 10px 30px rgba(6, 214, 160, 0.4);
            animation: scaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
            position: relative;
            overflow: hidden;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.3);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-value {
            font-size: 60px;
            font-weight: 800;
            color: white;
            line-height: 1;
            position: relative;
            z-index: 1;
            animation: countUp 1.5s ease-out 0.5s;
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .score-details {
            background: linear-gradient(135deg, #f0fdfc 0%, #e6f9f7 100%);
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            border-left: 5px solid #06d6a0;
            animation: slideInLeft 0.6s ease-out 0.4s both;
            box-shadow: 0 4px 15px rgba(6, 214, 160, 0.1);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-size: 16px;
            color: #333;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .detail-row:nth-child(1) {
            animation-delay: 0.5s;
        }

        .detail-row:nth-child(2) {
            animation-delay: 0.55s;
        }

        .detail-row:nth-child(3) {
            animation-delay: 0.6s;
        }

        .detail-label {
            font-weight: 600;
            color: #06d6a0;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .percentage {
            font-size: 32px;
            font-weight: bold;
            color: #118ab2;
            margin: 20px 0;
            animation: slideInUp 0.6s ease-out 0.65s both;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback {
            font-size: 18px;
            font-weight: 600;
            margin: 25px 0;
            padding: 20px;
            border-radius: 12px;
            background: #e6f9f7;
            color: #06d6a0;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s both;
            box-shadow: 0 4px 15px rgba(6, 214, 160, 0.1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .feedback.good {
            background: linear-gradient(135deg, #d4f5f1 0%, #b8ebe8 100%);
            color: #06d6a0;
        }

        .feedback.average {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            color: #e65100;
        }

        .feedback.poor {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }

        .feedback-icon {
            font-size: 30px;
            margin-right: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        .btn-retry {
            background: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(6, 214, 160, 0.4);
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-retry::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn-retry:hover::before {
            left: 100%;
        }

        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(6, 214, 160, 0.5);
        }

        .btn-retry:active {
            transform: translateY(-1px);
        }

        .btn-home {
            background: linear-gradient(135deg, #e0e0e0 0%, #d0d0d0 100%);
            color: #333;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-home::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.5s ease;
        }

        .btn-home:hover::before {
            left: 100%;
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #d0d0d0 0%, #c0c0c0 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        .star-rating {
            font-size: 48px;
            margin: 20px 0;
            letter-spacing: 10px;
            animation: starPulse 0.8s ease-out 0.4s both;
        }

        @keyframes starPulse {
            0% {
                opacity: 0;
                transform: scale(0) rotateZ(-360deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
        }

        @media (max-width: 600px) {
            .results-container {
                padding: 40px 25px;
            }

            .results-title {
                font-size: 28px;
            }

            .score-circle {
                width: 160px;
                height: 160px;
            }

            .score-value {
                font-size: 48px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-retry, .btn-home {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="results-container">
            <div class="results-header">
                <div class="results-title">🎉 Quiz Completed!</div>
                <div class="results-subtitle">Here are your results</div>
            </div>

            <div class="score-circle">
                <div class="score-value" id="scoreValue">0</div>
                <div class="score-label">out of <span id="totalQuestions">20</span></div>
            </div>

            <div class="percentage" id="percentageDisplay">0%</div>

            <div class="star-rating" id="starRating"></div>

            <div class="score-details">
                <div class="detail-row">
                    <span class="detail-label">Correct Answers:</span>
                    <span class="detail-value" id="correctAnswers">0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Wrong Answers:</span>
                    <span class="detail-value" id="wrongAnswers">0</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Success Rate:</span>
                    <span class="detail-value" id="successRate">0%</span>
                </div>
            </div>

            <div class="feedback" id="feedbackMessage"></div>

            <div class="button-group">
                <button class="btn-retry" onclick="retakeQuiz()">Retake Quiz</button>
                <button class="btn-home" onclick="goHome()">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>

        function displayResults() {
            var score = localStorage.getItem('quizScore') || 0;
            var totalQuestions = questions.length;
            var wrongAnswers = totalQuestions - score;
            var percentage = Math.round((score / totalQuestions) * 100);

            document.getElementById('scoreValue').innerText = score;
            document.getElementById('totalQuestions').innerText = totalQuestions;
            document.getElementById('correctAnswers').innerText = score;
            document.getElementById('wrongAnswers').innerText = wrongAnswers;
            document.getElementById('percentageDisplay').innerText = percentage + '%';
            document.getElementById('successRate').innerText = percentage + '%';

            // Display star rating
            var stars = getStarRating(percentage);
            document.getElementById('starRating').innerText = stars;

            // Display feedback message
            var feedbackDiv = document.getElementById('feedbackMessage');
            var feedbackText = '';
            var feedbackClass = '';

            if (percentage >= 80) {
                feedbackText = '🌟 Outstanding! You have a great understanding of HTML!';
                feedbackClass = 'good';
            } else if (percentage >= 60) {
                feedbackText = '👍 Good Job! You have a solid understanding of HTML.';
                feedbackClass = 'good';
            } else if (percentage >= 40) {
                feedbackText = '📚 Not Bad! Keep practicing to improve your HTML skills.';
                feedbackClass = 'average';
            } else {
                feedbackText = '💪 Keep Learning! Review the HTML basics and try again.';
                feedbackClass = 'poor';
            }

            feedbackDiv.innerText = feedbackText;
            feedbackDiv.className = 'feedback ' + feedbackClass;
        }

        function getStarRating(percentage) {
            if (percentage >= 90) return '⭐⭐⭐⭐⭐';
            if (percentage >= 80) return '⭐⭐⭐⭐';
            if (percentage >= 70) return '⭐⭐⭐';
            if (percentage >= 50) return '⭐⭐';
            return '⭐';
        }

        function retakeQuiz() {
            localStorage.removeItem('quizScore');
            window.location.href = 'index.html';
        }

        function goHome() {
            localStorage.removeItem('quizScore');
            window.location.href = 'index.html';
        }

        displayResults();
    </script>
</body>
</html>
